{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card shadow border-0">
      <div class="card-header text-center" style="background-color: #004e42; color: #ffcd00;">
        <h4>Faculty Activity Report Login</h4>
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" required>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" required>
          </div>
          <button type="submit" class="btn w-100" style="background-color: #ffcd00; color: #004e42; font-weight: bold;">
            Sign In
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
